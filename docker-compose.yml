services:
  postgres:
    image: postgres:16
    container_name: knowledge-postgres
    environment:
      POSTGRES_DB: knowledge_assistant
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: knowledge-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  knowledge-assistant:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: knowledge-assistant

    depends_on:
      - postgres
      - qdrant

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/knowledge_assistant
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin

      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334

      OLLAMA_BASE_URL: http://host.docker.internal:11434

volumes:
  postgres_data:
  qdrant_data: